<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <header>
      <div id="counts-line" class="counts-line hidden">
        <span id="group-count" class="count-item hidden"></span>
        <span id="tab-count" class="count-item hidden"></span>
      </div>
      <div class="row">
        <button id="group-btn">Group tabs</button>
        <button id="rearrange-btn">Re-organize tabs</button>
        <button id="undo-btn" class="g-btn" title="Undo last re-organize / apply" disabled>↶</button>
        <button id="logs-btn" class="g-btn" title="Download session log">⬇</button>
        <button id="copy-state-btn" class="g-btn" title="Copy tab + cluster state to clipboard">⧉</button>
        <button id="opts-btn" class="g-btn" title="Options">⚙</button>
      </div>
      <div class="row">
        <label class="opt"><input type="checkbox" id="control-size-chk" /> Control group size</label>
      </div>
      <div id="status-line" class="status-line hidden" role="status" aria-live="polite"></div>
      <div id="size-controls" class="hidden">
        <div class="row">
          <label class="opt" for="window-slider">Avg group size: <b id="window-val">8</b></label>
          <input type="range" id="window-slider" min="1" max="60" step="any" value="8" />
        </div>
        <div class="row">
          <label class="opt" for="penalty-slider">Big-group penalty: <b id="penalty-val">0.0</b></label>
          <input type="range" id="penalty-slider" min="0" max="10" step="any" value="3" />
        </div>
        <div class="row">
          <label class="opt" for="small-penalty-slider">Small-group penalty: <b id="small-penalty-val">0.0</b></label>
          <input type="range" id="small-penalty-slider" min="0" max="10" step="any" value="3" />
        </div>
      </div>
    </header>
    <main id="groups"></main>
    <script type="module" src="sidebar.js"></script>
  </body>
</html>
